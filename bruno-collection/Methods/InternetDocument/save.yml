docs: |-
  # 📦 Create Express Waybill (InternetDocument.save)

  This method belongs to the `InternetDocument` model. It is the final and most important step of the integration: generating the actual Express Waybill (ЕН / Інтернет-документ).

  💡 **Integration Strategy for Edge Cases:**  
  This single endpoint handles multiple delivery scenarios. Depending on whether you are shipping to a branch, shipping to a door using raw text strings, or requesting Cash on Delivery (Післяплата), your JSON payload will change slightly. See the multiple examples at the bottom of this documentation.

  ---

  ## 🛡️ Pre-Flight Check (Crucial Validations)

  To prevent API errors, validate the shipment data against the destination warehouse's capabilities (using data from `getWarehouses`):

  1. **Weight Limits:** Verify shipment weight against `TotalMaxWeightAllowed` and `PlaceMaxWeightAllowed`. _(Volumetric weight:_ `Width(cm) * Length(cm) * Height(cm) / 4000`).
      
  2. **Declared Cost Limit:** Verify `Cost` does not exceed `MaxDeclaredCost`.
      
  3. **Payment Availability:** If the recipient pays at the branch, ensure it accepts payments: `warehouse.PaymentAccess == "1" || warehouse.POSTerminal == "1"`.
      

  ### 💳 Clarification on Payment Methods (`PaymentMethod`)

  - **`"Cash"`** **(Payment on Delivery):** This means the service is paid when the package is picked up. _Important:_ This does NOT strictly mean physical paper money. The customer can pay by credit card at the branch's POS terminal. It simply signifies "Postpaid at the counter".
      
  - **`"NonCash"`** **(Remote / Contract Billing):** This means the delivery is paid remotely via a Nova Poshta corporate contract account (often by the Sender).
      

  ---

  ## 📥 Request Parameters (`methodProperties`)

  _(Note: Not all parameters are required at the same time. Required fields depend on the_ `ServiceType` _and extra services like Backward Delivery)._

  | Parameter | Type | Required | Description |
  | --- | --- | --- | --- |
  | `PayerType` | String | **Yes** | Who pays for the delivery: `"Sender"`, `"Recipient"`, or `"ThirdPerson"`. |
  | `PaymentMethod` | String | **Yes** | `"Cash"` (Paid on pickup - card/cash) or `"NonCash"` (Paid by corporate contract). |
  | `DateTime` | String | **Yes** | Planned shipping date in `DD.MM.YYYY` format. Max 3 months in the future. |
  | `CargoType` | String | **Yes** | e.g., `"Cargo"`, `"Parcel"`, `"Documents"` (For documents, Weight must be 0.1, 0.5, or 1.0). |
  | `VolumeGeneral` | String | **Yes** | Total volume of the shipment in cubic meters (m³). |
  | `Weight` | String | **Yes** | Actual weight in kg. |
  | `ServiceType` | String | **Yes** | e.g., `"WarehouseWarehouse"`, `"WarehouseDoors"`, `"DoorsWarehouse"`. |
  | `SeatsAmount` | String | **Yes** | Number of boxes/places. |
  | `Description` | String | **Yes** | Text description of the goods (e.g., "Одяг"). |
  | `Cost` | String | **Yes** | Declared assessed value of the goods in UAH. |
  | `CitySender` | String | **Yes** | Sender's City UUID. |
  | `Sender` | String | **Yes** | Sender's business UUID. |
  | `SenderAddress` | String | **Yes** | UUID of the Sender's drop-off Warehouse. |
  | `ContactSender` | String | **Yes** | Sender's human contact UUID. |
  | `SendersPhone` | String | **Yes** | Sender's phone number. |
  | `CityRecipient` | String | Conditional | Recipient's City UUID (Required for Warehouse delivery). |
  | `Recipient` | String | Conditional | Recipient's business/person UUID (Required for Warehouse delivery). |
  | `RecipientAddress` | String | Conditional | UUID of the Destination Warehouse (Required for Warehouse delivery). |
  | `ContactRecipient` | String | Conditional | Recipient's human contact UUID (Required for Warehouse delivery). |
  | `RecipientsPhone` | String | **Yes** | Recipient's phone number. |
  | `BackwardDeliveryData` | Array | No | Used for Cash on Delivery (Зворотня доставка грошей). See Example 3. |

  ### 🏠 Extra Parameters for "WarehouseDoors" using Text Strings

  If you are delivering to a specific address but don't want to sync massive street directories, you can pass the address as text strings.

  | Parameter | Type | Required | Description |
  | --- | --- | --- | --- |
  | `NewAddress` | String | Conditional | Must be `"1"` when using string-based door delivery. |
  | `RecipientCityName` | String | Conditional | Name of the recipient's city (Text). |
  | `RecipientArea` | String | Conditional | Name of the Area / Область (Text). |
  | `RecipientAreaRegions` | String | Conditional | Name of the District / Район (Text). |
  | `RecipientAddressName` | String | Conditional | Name of the street (Text). |
  | `RecipientHouse` | String | Conditional | House number. |
  | `RecipientFlat` | String | Conditional | Apartment number. |
  | `RecipientName` | String | Conditional | Full Name of the recipient (Text). |
  | `RecipientType` | String | Conditional | `"PrivatePerson"` or `"Organization"`. |

  ---

  ## 📤 Response Parameters (`data` array items)

  | Parameter | Type | Description |
  | --- | --- | --- |
  | `Ref` | String | Unique UUID of the created Express Waybill. Store this in your database. |
  | `IntDocNumber` | String | The actual 14-digit tracking number (e.g., "20450000000000"). |
  | `CostOnSite` | Number | The calculated delivery cost. |
  | `EstimatedDeliveryDate` | String | The estimated date of arrival (`DD.MM.YYYY`). |

  ---

  ## 📋 JSON Payload Examples

  ### Example 1: Standard Warehouse-to-Warehouse Delivery

  ``` json
  {
     "apiKey": "{{apiKey}}",
     "modelName": "InternetDocumentGeneral",
     "calledMethod": "save",
     "methodProperties": {
        "PayerType": "Sender",
        "PaymentMethod": "Cash",
        "DateTime": "30.06.2026",
        "CargoType": "Parcel",
        "VolumeGeneral": "0.1",
        "Weight": "2",
        "ServiceType": "WarehouseWarehouse",
        "SeatsAmount": "1",
        "Description": "Взуття",
        "Cost": "1500",
        "CitySender": "00000000-0000-0000-0000-000000000000",
        "Sender": "{{senderRef}}",
        "SenderAddress": "00000000-0000-0000-0000-000000000000",
        "ContactSender": "{{contactSenderRef}}",
        "SendersPhone": "380660000000",
        "CityRecipient": "00000000-0000-0000-0000-000000000000",
        "Recipient": "00000000-0000-0000-0000-000000000000",
        "RecipientAddress": "00000000-0000-0000-0000-000000000000",
        "ContactRecipient": "00000000-0000-0000-0000-000000000000",
        "RecipientsPhone": "380990000000"
     }
  }

   ```

  ### Example 2: Cash On Delivery / Післяплата (Warehouse-to-Warehouse)

  _Includes_ `BackwardDeliveryData` _to return money to the Sender._

  ``` json
  {
     "apiKey": "{{apiKey}}",
     "modelName": "InternetDocumentGeneral",
     "calledMethod": "save",
     "methodProperties": {
        "PayerType": "Recipient",
        "PaymentMethod": "Cash",
        "DateTime": "30.06.2026",
        "CargoType": "Parcel",
        "VolumeGeneral": "0.1",
        "Weight": "2",
        "ServiceType": "WarehouseWarehouse",
        "SeatsAmount": "1",
        "Description": "Телефон",
        "Cost": "15000",
        "CitySender": "00000000-0000-0000-0000-000000000000",
        "Sender": "{{senderRef}}",
        "SenderAddress": "00000000-0000-0000-0000-000000000000",
        "ContactSender": "{{contactSenderRef}}",
        "SendersPhone": "380660000000",
        "CityRecipient": "00000000-0000-0000-0000-000000000000",
        "Recipient": "00000000-0000-0000-0000-000000000000",
        "RecipientAddress": "00000000-0000-0000-0000-000000000000",
        "ContactRecipient": "00000000-0000-0000-0000-000000000000",
        "RecipientsPhone": "380990000000",
        "BackwardDeliveryData": [
           {
              "PayerType": "Recipient",
              "CargoType": "Money",
              "RedeliveryString": "15000"
           }
        ]
     }
  }

   ```

  ### Example 3: Door Delivery using Text Strings (No Recipient Ref Needed)

  _Bypasses the need for Recipient UUIDs by passing raw address strings._

  ``` json
  {
     "apiKey": "{{apiKey}}",
     "modelName": "InternetDocumentGeneral",
     "calledMethod": "save",
     "methodProperties": {
        "PayerType": "Sender",
        "PaymentMethod": "Cash",
        "DateTime": "30.06.2026",
        "CargoType": "Parcel",
        "VolumeGeneral": "0.1",
        "Weight": "2",
        "ServiceType": "WarehouseDoors",
        "SeatsAmount": "1",
        "Description": "Книги",
        "Cost": "500",
        "CitySender": "{{citySenderRef}}",
        "Sender": "{{senderRef}}",
        "SenderAddress": "00000000-0000-0000-0000-000000000000",
        "ContactSender": "{{contactSenderRef}}",
        "SendersPhone": "380660000000",
        "RecipientsPhone": "380990000000",
        "NewAddress": "1",
        "RecipientCityName": "Київ",
        "RecipientArea": "Київська",
        "RecipientAreaRegions": "",
        "RecipientAddressName": "Хрещатик",
        "RecipientHouse": "22",
        "RecipientFlat": "14",
        "RecipientName": "Коваленко Петро Петрович",
        "RecipientType": "PrivatePerson"
     }
  }

   ```

  After the successful response you can find waybill info in your personal account (https://new.novaposhta.ua/dashboard/invoices-my)

