docs: |-
  # 🔍 Search Settlements (Online Search)

  This method belongs to the `AddressGeneral`. It allows you to perform a **REAL-TIME online search** for settlements.

  💡 **Best Practice for Integration:**  
  Use this method if you chose **Integration Approach 1 (Real-Time Search)**. With this method, you do not need to download, store, or update the massive directories of settlements on your server. You simply call this endpoint on the fly when the user types a city name in your checkout form.

  ### ⚠️ Important Notes

  - **Language Restriction:** The search string (`CityName`) **must be in Ukrainian**.
      
  - **Ready-to-Use UI String:** The response includes a `Present` field, which contains a pre-formatted string (e.g., "м. Київ, Київська обл."). You can display this directly in your frontend dropdown menu to save time on formatting.
      

  ---

  ## 📥 Request Parameters (`methodProperties`)

  | **Parameter** | **Type** | **Required** | **Description** |
  | --- | --- | --- | --- |
  | `CityName` | String | **Yes** | The name of the settlement to search for. **Must be in Ukrainian** (e.g., "Київ"). |
  | `Page` | String | No | The page number for pagination (e.g., "1"). |
  | `Limit` | String | No | Number of records per page (e.g., "50"). |

  ### Example Request Body

  ``` json
  {
     "apiKey": "{{apiKey}}",
     "modelName": "AddressGeneral",
     "calledMethod": "searchSettlements",
     "methodProperties": {
        "CityName": "Київ",
        "Limit": "50",
        "Page": "1"
     }
  }

   ```

  ## 📤 Response Parameters (`data[0].Addresses` array items)

  The search results are nested inside the `Addresses` array within the first object of the `data` array.

  | Parameter | Type | Description |
  | --- | --- | --- |
  | TotalCount | Number | Total number of found settlements |
  | Present | String | Formatted string with type, name, and region (e.g., "м. Львів, Львівська обл.") |
  | Ref | String | Settlement UUID |
  | DeliveryCity | String | UUID used for routing in waybills |
  | MainDescription | String | Settlement name (e.g., "Львів") |
  | Area | String | Area (область) |
  | Region | String | District/region (район) |
  | Warehouses | Number | Number of active NP branches |
  | AddressDeliveryAllowed | Boolean | `true` = courier delivery available |
  | StreetsAvailability | Boolean | `true` = streets directory available |
  | SettlementTypeCode | String | Short settlement type (e.g., "м.", "с.") |

  ### Example Response Body

  ``` json
  {
      "success": true,
      "data": [
          {
              "TotalCount": 8,
              "Addresses": [
                  {
                      "Present": "м. Львів, Львівська обл.",
                      "Warehouses": 3578,
                      "MainDescription": "Львів",
                      "Area": "Львівська",
                      "Region": "",
                      "SettlementTypeCode": "м.",
                      "Ref": "e71abb60-4b33-11e4-ab6d-005056801329",
                      "DeliveryCity": "db5c88f5-391c-11dd-90d9-001a92567626",
                      "AddressDeliveryAllowed": true,
                      "StreetsAvailability": true,
                      "ParentRegionTypes": "область",
                      "ParentRegionCode": "обл.",
                      "RegionTypes": "",
                      "RegionTypesCode": ""
                  }
              ]
          }
      ],
      "errors": [],
      "warnings": [],
      "info": [],
      "messageCodes": [],
      "errorCodes": [],
      "warningCodes": [],
      "infoCodes": []
  }

   ```
