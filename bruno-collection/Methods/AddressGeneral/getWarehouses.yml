  | TypeOfWarehouse | String | Warehouse type UUID |
  | Number | String | Branch number (e.g., "1") |
  | CityRef | String | City UUID |
  | CityDescription | String | City name (UA) |
  | CityDescriptionRu | String | City name (RU) |
  | CityDescriptionTranslit | String | City name (translit) |
  | SettlementRef | String | Settlement UUID |
  | SettlementDescription | String | Settlement name (UA) |
  | SettlementDescriptionRu | String | Settlement name (RU) |
  | SettlementDescriptionTranslit | String | Settlement name (translit) |
  | SettlementAreaDescription | String | Area name (UA) |
  | SettlementAreaDescriptionRu | String | Area name (RU) |
  | SettlementAreaDescriptionTranslit | String | Area name (translit) |
  | SettlementRegionsDescription | String | Region name (UA) |
  | SettlementRegionsDescriptionRu | String | Region name (RU) |
  | SettlementRegionsDescriptionTranslit | String | Region name (translit) |
  | SettlementTypeDescription | String | Settlement type (UA) |
  | SettlementTypeDescriptionRu | String | Settlement type (RU) |
  | SettlementTypeDescriptionTranslit | String | Settlement type (translit) |
  | Longitude | String | Longitude coordinate |
  | Latitude | String | Latitude coordinate |
  | PostFinance | String | "1" = has NovaPay cash desk |
  | BicycleParking | String | "1" = bicycle parking available |
  | PaymentAccess | String | "1" = payment available |
  | POSTerminal | String | "1" = POS terminal available |
  | InternationalShipping | String | "1" = international shipping available |
  | SelfServiceWorkplacesCount | String | Number of self-service terminals |
  | TotalMaxWeightAllowed | String | Max total weight (kg), "0" = unlimited |
  | PlaceMaxWeightAllowed | String | Max weight per parcel (kg) |
  | SendingLimitationsOnDimensions | Object | Max sending dimensions (W/H/L) |
  | ReceivingLimitationsOnDimensions | Object | Max receiving dimensions (W/H/L) |
  | Reception | Object | Reception time windows |
  | Delivery | Object | Delivery time windows |
  | Schedule | Object | Working hours by days |
  | DistrictCode | String | Internal district code |
  | WarehouseStatus | String | Operational status |
  | WarehouseStatusDate | String | Status last updated timestamp |
  | WarehouseIllusha | String | Internal status parameter |
  | CategoryOfWarehouse | String | Category (e.g., "Branch", "Postomat") |
  | Direct | String | Internal routing code |
  | RegionCity | String | Main hub city |
  | WarehouseForAgent | String | "1" = available for agents |
  | GeneratorEnabled | String | "1" = has generator |
  | MaxDeclaredCost | String | Max declared value |
  | WorkInMobileAwis | String | Mobile AWIS compatibility |
  | DenyToSelect | String | "1" = not selectable |
  | CanGetMoneyTransfer | String | "1" = money transfer available |
  | HasMirror | String | "1" = mirror available |
  | HasFittingRoom | String | "1" = fitting room available |
  | OnlyReceivingParcel | String | "1" = only receiving parcels |
  | PostMachineType | String | Postomat type |
  | PostalCodeUA | String | Postal code |
  | WarehouseIndex | String | Internal index |
  | BeaconCode | String | Beacon identifier |
  | Location | String | Internal geolocation field |
  | info.totalCount | Number | Total number of warehouses |

