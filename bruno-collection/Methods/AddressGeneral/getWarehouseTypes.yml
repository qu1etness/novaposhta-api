docs: |-
  # 🏷️ Get Warehouse Types

  This method belongs to the `AddressGeneral` model. It downloads the complete directory of warehouse types used by Nova Poshta (e.g., Post office, Cargo department, Parcel locker / Postomat).

  💡 **Best Practice for Integration:**  
  Just like settlements and warehouses, **it is highly recommended to download and store this list in your local database**. You can use this locally stored data to populate a dropdown filter in your user interface, allowing your customers to search specifically for Postomats, direct Delivery, or standard Post offices without making real-time API calls as shown on the screenshot below. You can then use the `Ref` obtained from this response as the `TypeOfWarehouseRef` parameter in the `getWarehouses` method to filter your branch downloads.

  <img src="https://content.pstmn.io/5d471862-3263-4ddb-90f7-efb251d895df/aW1hZ2UucG5n" width="744" height="287">

  ---

  ## 📥 Request Parameters (`methodProperties`)

  This method does not require any specific parameters to be passed, but the `methodProperties` object itself must be present in the request.

  ### Example Request Body

  ``` json
  {
     "apiKey": "{{apiKey}}",
     "modelName": "AddressGeneral",
     "calledMethod": "getWarehouseTypes",
     "methodProperties": {}
  }

   ```

  ## 📤 Response Parameters (`data` array items)

  | Parameter | Type | Description |
  | --- | --- | --- |
  | Ref | String | UUID of the warehouse type. Use this to filter branches in `getWarehouses` |
  | Description | String | Name of the warehouse type in Ukrainian (e.g., "Поштове відділення") |
  | DescriptionRu | String | Name of the warehouse type in Russian |

  ### Example Response Body

  ``` json
  {
      "success": true,
      "data": [
          {
              "Ref": "00000000-0000-0000-0000-000000000000",
              "Description": "Поштове відділення",
              "DescriptionRu": "Почтовое отделение"
          }
      ],
      "errors": [],
      "warnings": [],
      "info": [],
      "messageCodes": [],
      "errorCodes": [],
      "warningCodes": [],
      "infoCodes": []
  }

   ```
