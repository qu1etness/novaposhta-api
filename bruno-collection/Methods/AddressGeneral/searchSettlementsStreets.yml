docs: |-
  # 🛣️ Search Settlement Streets (Online Search)

  This method belongs to the `AddressGeneral.` It allows you to perform a **REAL-TIME online search** for streets within a specific settlement.

  💡 **Integration Strategies:**  
  Use this method for **Approach 1 (Real-Time Requests)**. When a user selects door-to-door delivery, you do not need to download the massive street directories to your server. Instead, after the user selects a settlement (using `searchSettlements`), you take its `Ref` and use it as the `SettlementRef` here to search for streets dynamically as they type.

  ### ⚠️ Important Notes

  - **Language Restriction:** The search string (`StreetName`) **must be in Ukrainian**.
      
  - **Ready-to-Use UI String:** Just like the settlement search, the response includes a `Present` field (e.g., "вул. Хрещатик"). This is highly recommended for displaying in your frontend dropdown.
      
  - **Mandatory Field:** You must provide a valid `SettlementRef` to scope the search to a specific city/village.
      

  ---

  ## 📥 Request Parameters (`methodProperties`)

  | Parameter | Type | Required | Description |
  | --- | --- | --- | --- |
  | `StreetName` | String | **Yes** | The name of the street to search for. **Must be in Ukrainian** (e.g., "Хрещатик"). |
  | `SettlementRef` | String | **Yes** | Unique UUID of the settlement. Obtained from the `searchSettlements` or `getSettlements` method. |
  | `Limit` | String | No | Number of records to return (e.g., "50"). |

  ### Example Request Body

  ``` json
  {
     "apiKey": "{{apiKey}}",
     "modelName": "AddressGeneral",
     "calledMethod": "searchSettlementStreets",
     "methodProperties": {
        "StreetName": "Хрещатик",
        "SettlementRef": "e718a680-4b33-11e4-ab6d-005056801329",
        "Limit": "50"
     }
  }

   ```

  StartFragment

  ## 📤 Response Parameters (`data[0].Addresses` array items)

  The search results are nested inside the `Addresses` array within the first object of the `data` array.

  | Parameter | Type | Description |
  | --- | --- | --- |
  | TotalCount | Number | Total number of found streets |
  | SettlementRef | String | Settlement UUID |
  | SettlementStreetRef | String | Street UUID (used for waybills) |
  | SettlementStreetDescription | String | Street name (UA, without type) |
  | SettlementStreetDescriptionRu | String | Street name (RU) |
  | SettlementStreetDescriptionTranslit | String | Street name (translit) |
  | Present | String | Formatted string (e.g., "вул. Хрещатик") |
  | StreetsType | String | Street type UUID |
  | StreetsTypeDescription | String | Street type (UA, e.g., "вул.") |
  | StreetsTypeDescriptionRu | String | Street type (RU) |
  | StreetsTypeDescriptionTranslit | String | Street type (translit) |
  | Location | Object | Coordinates object |
  | Location.lat | Number | Latitude |
  | Location.lon | Number | Longitude |

  ``` json
  {
      "success": true,
      "data": [
          {
              "TotalCount": 1,
              "Addresses": [
                  {
                      "SettlementRef": "e718a680-4b33-11e4-ab6d-005056801329",
                      "SettlementStreetRef": "ad090b1f-6845-11e6-8304-00505688561d",
                      "SettlementStreetDescription": "Хрещатик",
                      "Present": "вул. Хрещатик",
                      "StreetsType": "0f1d7fbb-4bba-11e4-ab6d-005056801329",
                      "StreetsTypeDescription": "вул.",
                      "Location": {
                          "lat": 50.44806099962443,
                          "lon": 30.52225599065423
                      },
                      "SettlementStreetDescriptionRu": "Крещатик"
                  }
              ]
          }
      ],
      "errors": [],
      "warnings": [],
      "info": [],
      "messageCodes": [],
      "errorCodes": [],
      "warningCodes": [],
      "infoCodes": []
  }

   ```
